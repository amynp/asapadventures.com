---
layout: default
---

<div id="page-content" class="blog-page">

  {% include banner-image.html %}

  <main>
    <div class="blog-post-wrapp">
      <div class="container">
        <div class="row">
          <div class="col-md-2"></div>
          <div class="col-md-8">
            <div class="blog-post-content">
              {{ page.content }}
            </div>
          </div>
          <div class="col-md-2"></div>
        </div>

        <!-- pagination -->
        <div class="row">
          <div class="col-md-12">
            <nav aria-label="Page navigation" class="wow fadeInUp" data-wow-delay="0.2s">
              <ul class="pagination posts-pagination text-uppercase">
                {% if page.previous %}
                  <li class="prev-post pull-left">
                    <a href="{{ page.previous.url | prepend: site.baseurl }}">
                      {{ page.previous.title }}
                    </a>
                  </li>
                {% endif %}

                {% if page.next %}
                  <li class="next-post pull-right">
                    <a href="{{ page.next.url | prepend: site.baseurl }}">
                      {{ page.next.title }}
                    </a>
                  </li>
                {% endif %}
              </ul>
            </nav>
          </div>
        </div>
        <!-- /.pagination -->

      {% include comments.html %}
      </div>
    </div>

    {% include go-up-arrow.html %}
  </main>

  <link rel="stylesheet" href="{{ "/css/tobii.min.css" | prepend: site.baseurl }}" />
  <script type="text/javascript" src="{{ "/js/tobii.min.js" | prepend: site.baseurl }}"></script>
  <script>
    console.log("[POOP dafuq")
    document.addEventListener('DOMContentLoaded', function() {
      console.log("[POOP] domloaded")
      // This assumes your article is wrapped in an element with the class "content-article".
  document.querySelectorAll('.blog-post-content img').forEach((articleImg) => {
    // Add lightbox elements in blog articles for Tobii.
    const lightbox = document.createElement('a');
    lightbox.href = articleImg.src;
    lightbox.classList.add('lightbox');
    lightbox.dataset.group = 'article';
    // articleImg.parentNode.appendChild(lightbox);
    // lightbox.appendChild(articleImg);
  });
    });
  </script>
</div>
